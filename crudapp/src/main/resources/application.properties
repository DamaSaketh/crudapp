# ===========================
# SERVER CONFIG
# ===========================
server.port=9090

# ===========================
# H2 DATABASE CONFIG
# ===========================
spring.datasource.url=jdbc:h2:mem:cruddb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.platform=h2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# JPA / HIBERNATE CONFIG
# ===========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false    

# Remove explicit dialect (let Spring Boot handle it)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===========================
# LOGGING CONFIG
# ===========================
logging.level.org.hibernate=warn
logging.level.org.springframework=info

# ===========================
# SPRING SECURITY (DEV ONLY)
# ===========================
# Your SecurityConfig already permits all, so no default password warning
spring.security.user.name=admin
spring.security.user.password=admin
spring.main.allow-circular-references=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# H2 console



spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# Logging
logging.level.org.springframework.security=DEBUG

logging.level.com.example.crudapp=DEBUG
# Keep column names exactly as in DB
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl